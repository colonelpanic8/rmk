[keyboard]
# Replace with your keyboard identity.
name = "RMK Keyboard"
product_name = "RMK Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "haobo"
board = "pi_pico_w"

[layout]
rows = 4
cols = 3
map = """
(0,0)  (0,1)  (0,2)
(1,0)  (1,1)  (1,2)
(2,0)  (2,1)  (2,2)
(3,0)  (3,1)  (3,2)
"""

[keymap]
layers = 3

[[keymap.layer]] # layer 0
keys = """
A       B           C
Kc1     Kc2         Kc3
LCtrl   MO(1)       LShift
OSL(1)  LT(2, Kc9)  LM(1, LShift | LGui)
"""

[[keymap.layer]] # layer 1
keys = """
_  TT(1)  TG(2)
_  _      _
_  _      _
_  _      _
"""

[ble]
enabled = true


[split]
connection = "ble"

[split.central]
rows = 2
cols = 2
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]

[split.central.matrix]
matrix_type = "normal"
# Default diode direction is col2row; set `row2col = true` if needed.
# row2col = true
row_pins = ["PIN_6", "PIN_7"]
col_pins = ["PIN_19", "PIN_20"]

[[split.peripheral]]
rows = 2
cols = 1
row_offset = 2
col_offset = 2
ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]

[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["PIN_8", "PIN_9"]
col_pins = ["PIN_19"]