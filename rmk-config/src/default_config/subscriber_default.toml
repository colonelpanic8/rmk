# Capability-based event subscriber declarations.
#
# When all `capabilities` listed in an entry are active (resolved from
# keyboard.toml and cargo features at build time), each event's `subs`
# is bumped by the specified amount.
#
# This keeps event_default.toml at base counts and avoids wasting
# static memory when a capability is disabled.
#
# Format per event: { name = "event_name", count = N }
# `count` defaults to 1 if omitted.

# --- Display-gated internal subscribers ---

[[subscriber]]
capabilities = ["display"]
events = [
    # display/mod.rs: DisplayProcessor subscribes to these events
    { name = "wpm_update" },
    { name = "modifier" },
    { name = "sleep_state" },
    { name = "layer_change" },
    { name = "battery_status" },
    { name = "led_indicator" },
]

[[subscriber]]
capabilities = ["display", "ble"]
events = [
    # display/mod.rs: DisplayProcessor subscribes when ble is active
    { name = "connection_status_change" },
]

[[subscriber]]
capabilities = ["display", "split"]
events = [
    # split/driver.rs: each PeripheralManager subscribes when display is enabled
    # (gated on #[cfg(rmk_display)] in driver.rs)
    # Covers up to 2 peripherals; for 3+ peripherals override subs in keyboard.toml
    { name = "wpm_update", count = 2 },
    { name = "sleep_state", count = 2 },
]

# --- BLE-gated internal subscribers ---

[[subscriber]]
capabilities = ["ble"]
events = [
    # ble/battery_service.rs: BatteryStatusEvent::subscriber()
    # processor/builtin/battery_led.rs: subscribe = [BatteryStatusEvent] (user-optional but _ble-gated)
    { name = "battery_status", count = 2 },
]

# Rynk sessions subscribe to these topics; USB+BLE boards need two slots.

[[subscriber]]
capabilities = ["rynk"]
events = [
    { name = "layer_change" },
    { name = "wpm_update" },
    { name = "connection_status_change" },
    { name = "sleep_state" },
    { name = "led_indicator" },
]

[[subscriber]]
capabilities = ["rynk", "ble"]
events = [
    # battery_status is only subscribed under `rmk_ble`; needs one slot per
    # concurrent session (USB + BLE = 2).
    { name = "battery_status", count = 2 },
    # Second session slot for the always-on topics on dual-transport boards.
    { name = "layer_change" },
    { name = "wpm_update" },
    { name = "connection_status_change" },
    { name = "sleep_state" },
    { name = "led_indicator" },
]

# --- Split-gated internal subscribers ---

[[subscriber]]
capabilities = ["split"]
events = [
    # split/peripheral.rs: KeyboardEvent::subscriber()
    { name = "keyboard" },
    # split/peripheral.rs: PointingEvent::subscriber()
    { name = "pointing" },
    # split/driver.rs: LedIndicatorEvent::subscriber()
    # Covers up to 2 peripherals; for 3+ peripherals override subs in keyboard.toml
    { name = "led_indicator", count = 2 },
    # split/driver.rs: LayerChangeEvent::subscriber()
    { name = "layer_change" },
    # split/driver.rs: ConnectionStatusChangeEvent::subscriber()
    # Covers up to 2 peripherals; for 3+ peripherals override subs in keyboard.toml
    { name = "connection_status_change", count = 2 },
]

# --- Split + BLE-gated internal subscribers ---

[[subscriber]]
capabilities = ["split", "ble"]
events = [
    # split/ble/peripheral.rs: KeyboardEvent::subscriber() (temporary, on timeout)
    { name = "keyboard" },
    # split/peripheral.rs: ChargingStateEvent::subscriber() (cfg rmk_ble)
    { name = "charging_state" },
    # split/peripheral.rs: BatteryStatusEvent::subscriber() (cfg rmk_ble)
    { name = "battery_status" },
    # split/driver.rs: ClearPeerEvent::subscriber() (cfg rmk_ble)
    # Covers up to 2 peripherals; for 3+ peripherals override subs in keyboard.toml
    { name = "clear_peer", count = 2 },
]
